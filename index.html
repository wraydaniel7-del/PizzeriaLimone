const uid=()=>Math.random().toString(36).slice(2,9)+Date.now().toString(36);
function compressImage(file,maxW=480,quality=0.72){
  return new Promise((resolve,reject)=>{
    const reader=new FileReader();
    reader.onload=e=>{
      const img=new Image();
      img.onload=()=>{
        const scale=Math.min(1,maxW/img.width);
        const w=Math.max(1,Math.round(img.width*scale)),h=Math.max(1,Math.round(img.height*scale));
        const canvas=document.createElement('canvas');
        canvas.width=w;canvas.height=h;
        canvas.getContext('2d').drawImage(img,0,0,w,h);
        resolve(canvas.toDataURL('image/jpeg',quality));
      };
      img.onerror=()=>reject(new Error('Not a readable image file'));
      img.src=e.target.result;
    };
    reader.onerror=()=>reject(new Error('Could not read file'));
    reader.readAsDataURL(file);
  });
}
const toNum=v=>{const n=Number(String(v??'').replace(/[^0-9.\-]/g,''));return isFinite(n)?n:0;};
const fmt=n=>n>=1e6?(n/1e6).toFixed(1).replace(/\.0$/,'')+'M':n>=1e3?(n/1e3).toFixed(1).replace(/\.0$/,'')+'K':Math.round(n).toLocaleString();
const fmtSec=n=>!n?'—':`${Math.floor(n/60)}:${String(Math.round(n%60)).padStart(2,'0')}`;
const pctChange=(a,b)=>b?((a-b)/b)*100:null;

const cleanSlots=arr=>(arr||[]).map(e=>({name:e.name||'',value:toNum(e.value)})).filter(e=>e.name.trim()||e.value);
function weekStart(d){const dt=new Date(d+'T00:00:00');if(isNaN(dt))return d;const day=dt.getDay();dt.setDate(dt.getDate()+((day===0?-6:1)-day));return dt.toISOString().slice(0,10);}
function weekLabel(ws){const s=new Date(ws+'T00:00:00'),e=new Date(s);e.setDate(s.getDate()+6);const o={month:'short',day:'numeric'};return `Week of ${s.toLocaleDateString('en-US',o)}–${s.getMonth()===e.getMonth()?e.getDate():e.toLocaleDateString('en-US',o)}`;}
const erRate=p=>p.views?((p.likes+p.comments+p.shares+p.saves)/p.views)*100:0;
function avgGroup(items,field,keys){const w=items.filter(p=>p[field]&&keys.some(k=>toNum(p[field][k])>0));if(!w.length)return null;const out=Object.fromEntries(keys.map(k=>[k,0]));w.forEach(p=>keys.forEach(k=>{out[k]+=toNum(p[field][k]);}));keys.forEach(k=>{out[k]/=w.length;});return out;}
function avgSlots(items,field){const map=new Map();let c=0;items.forEach(p=>{const sl=(p.location?.[field]||[]).filter(s=>s.name?.trim()&&toNum(s.value)>0);if(sl.length)c++;sl.forEach(s=>{const cur=map.get(s.name.trim())||{sum:0,n:0};cur.sum+=toNum(s.value);cur.n++;map.set(s.name.trim(),cur);});});if(!c)return null;return Array.from(map.entries()).map(([name,{sum,n}])=>({name,value:sum/n})).sort((a,b)=>b.value-a.value);}

/* ── CSV import parser (reads existing Google Sheet format) ── */
const _hk=s=>s.trim().toLowerCase().replace(/[^a-z0-9]/g,'');
const ICOL={
  date:['date','publishtime','postdate'],caption:['videoname','caption','description','posttext','title','postname'],
  link:['link','permalink','url'],views:['views','videoviews','plays'],likes:['likes'],comments:['comments'],
  shares:['shares'],saves:['saves','bookmarks'],videoLength:['videolength','videolengthsec'],
  avgWatchTime:['averagewatchtime','avgwatchtime'],pctCompleted:['completed','percentcompleted'],
  newFollowers:['newfollowers'],forYou:['foryou','foryoupage','fyp'],personalProfile:['personalprofile','profile'],
  searchT:['search'],otherT:['othertraffic','other'],newV:['new','newviewers'],retV:['returning','returningviewers'],
  male:['male'],female:['female'],otherGender:['othergender'],
  age1824:['1824','age1824'],age2534:['2534','age2534'],age3544:['3544','age3544'],age4554:['4554','age4554'],age55plus:['55','55plus'],
  platform:['platform'],inUS:['inus'],outUS:['outus'],
  saltLake:['saltlakecounty','saltlake'],utahCo:['utahcounty'],davisCo:['daviscounty'],otherCo:['othercounty'],
};
function _fc(headers,cands){const n=headers.map(_hk);for(const c of cands){const i=n.indexOf(c);if(i!==-1)return headers[i];}for(const c of cands){const i=n.findIndex(k=>k.startsWith(c));if(i!==-1)return headers[i];}return null;}
function parseImportedCSV(csvText,clientId){
  const {data}=Papa.parse(csvText.trim(),{header:true,skipEmptyLines:true});
  if(!data.length)return [];
  const headers=Object.keys(data[0]);
  const col={};Object.entries(ICOL).forEach(([k,c])=>{col[k]=_fc(headers,c);});
  const ig={date:_fc(headers,['idate']),caption:_fc(headers,['ipostname','ipost']),views:_fc(headers,['iviews']),likes:_fc(headers,['ilikes']),comments:_fc(headers,['icomments']),shares:_fc(headers,['ishares']),newF:_fc(headers,['inewfollowers'])};
  const g=(row,k)=>col[k]?(row[col[k]]||''):'';
  const posts=[];
  data.forEach((row,idx)=>{
    const rd=g(row,'date');if(!rd)return;
    let date=new Date().toISOString().slice(0,10);const d=new Date(rd);if(!isNaN(d))date=d.toISOString().slice(0,10);
    let platform='tiktok';if(col.platform&&row[col.platform])platform=row[col.platform].toLowerCase().includes('tik')?'tiktok':'instagram';
    const usLoc=[];
    if(col.inUS&&toNum(row[col.inUS])>0)usLoc.push({name:'United States',value:toNum(row[col.inUS])});
    if(col.outUS&&toNum(row[col.outUS])>0)usLoc.push({name:'International',value:toNum(row[col.outUS])});
    const utahLoc=[];
    if(col.saltLake&&toNum(row[col.saltLake])>0)utahLoc.push({name:'Salt Lake County',value:toNum(row[col.saltLake])});
    if(col.utahCo&&toNum(row[col.utahCo])>0)utahLoc.push({name:'Utah County',value:toNum(row[col.utahCo])});
    if(col.davisCo&&toNum(row[col.davisCo])>0)utahLoc.push({name:'Davis County',value:toNum(row[col.davisCo])});
    if(col.otherCo&&toNum(row[col.otherCo])>0)utahLoc.push({name:'Other County',value:toNum(row[col.otherCo])});
    posts.push({id:uid(),clientId,platform,date,caption:g(row,'caption'),link:g(row,'link'),thumb:'',
      views:toNum(g(row,'views')),likes:toNum(g(row,'likes')),comments:toNum(g(row,'comments')),shares:toNum(g(row,'shares')),saves:toNum(g(row,'saves')),
      videoLength:toNum(g(row,'videoLength')),avgWatchTime:toNum(g(row,'avgWatchTime')),pctCompleted:toNum(g(row,'pctCompleted')),newFollowers:toNum(g(row,'newFollowers')),
      traffic:{forYou:toNum(g(row,'forYou')),personalProfile:toNum(g(row,'personalProfile')),search:toNum(g(row,'searchT')),other:toNum(g(row,'otherT'))},
      newReturning:{newViewers:toNum(g(row,'newV')),returningViewers:toNum(g(row,'retV'))},
      gender:{male:toNum(g(row,'male')),female:toNum(g(row,'female')),otherGender:toNum(g(row,'otherGender'))},
      age:{age1824:toNum(g(row,'age1824')),age2534:toNum(g(row,'age2534')),age3544:toNum(g(row,'age3544')),age4554:toNum(g(row,'age4554')),age55plus:toNum(g(row,'age55plus'))},
      location:{us:usLoc,utah:utahLoc}});
    const igD=ig.date?(row[ig.date]||''):'';const igV=ig.views?toNum(row[ig.views]):0;
    if(igD&&igV>0){let iDate=new Date().toISOString().slice(0,10);const igd=new Date(igD);if(!isNaN(igd))iDate=igd.toISOString().slice(0,10);
      posts.push({id:uid(),clientId,platform:'instagram',date:iDate,caption:ig.caption?(row[ig.caption]||''):'',link:'',thumb:'',
        views:igV,likes:ig.likes?toNum(row[ig.likes]):0,comments:ig.comments?toNum(row[ig.comments]):0,shares:ig.shares?toNum(row[ig.shares]):0,saves:0,
        videoLength:0,avgWatchTime:0,pctCompleted:0,newFollowers:ig.newF?toNum(row[ig.newF]):0,
        traffic:{},newReturning:{},gender:{},age:{},location:{us:[],utah:[]}});}
  });
  return posts;
}


/* ── Map utilities (no d3 dependency) ── */
const topoCache={};
function _applyT(t,x,y){if(!t.transform)return[x,y];const[sx,sy]=t.transform.scale,[tx,ty]=t.transform.translate;return[x*sx+tx,y*sy+ty];}
function _decodeArc(t,idx){const rev=idx<0,i=rev?~idx:idx;let x=0,y=0;const c=t.arcs[i].map(([dx,dy])=>{x+=dx;y+=dy;return _applyT(t,x,y);});return rev?c.slice().reverse():c;}
function _arcRing(t,idxs){let r=[];idxs.forEach(i=>{const c=_decodeArc(t,i);if(r.length)r.pop();r=r.concat(c);});return r;}
function topoFeats(topo,name,filterFn){return(topo.objects[name]?.geometries||[]).map(g=>{let coords=null;if(g.type==='Polygon')coords=g.arcs.map(r=>_arcRing(topo,r));if(g.type==='MultiPolygon')coords=g.arcs.map(p=>p.map(r=>_arcRing(topo,r)));if(!coords)return null;return{type:'Feature',id:g.id,properties:g.properties||{},geometry:{type:g.type,coordinates:coords}};}).filter(Boolean).filter(filterFn||(()=>true));}
function useTopoFeatures(url,name,filterFn){const[state,setState]=useState(()=>topoCache[url]?{features:topoCache[url],error:null}:{features:null,error:null});useEffect(()=>{if(topoCache[url]){setState({features:topoCache[url],error:null});return;}let cancelled=false;fetch(url).then(r=>r.json()).then(topo=>{if(cancelled)return;const feats=topoFeats(topo,name,filterFn);topoCache[url]=feats;setState({features:feats,error:null});}).catch(e=>{if(!cancelled)setState({features:null,error:e});});return()=>{cancelled=true;};},[url,name]);return state;}
function _geoPoints(geom,out){const rings=geom?.type==='Polygon'?geom.coordinates:geom?.type==='MultiPolygon'?geom.coordinates.flat():[];rings.forEach(r=>r.forEach(p=>out.push(p)));return out;}
function makeProjector(features,extra,W,H,pad=0.06){let pts=[];(features||[]).forEach(f=>_geoPoints(f.geometry,pts));pts=pts.concat(extra||[]);if(!pts.length)return{project:()=>[W/2,H/2],bounds:null};let minLon=Infinity,maxLon=-Infinity,minLat=Infinity,maxLat=-Infinity;pts.forEach(([lo,la])=>{if(lo<minLon)minLon=lo;if(lo>maxLon)maxLon=lo;if(la<minLat)minLat=la;if(la>maxLat)maxLat=la;});const cosLat=Math.max(0.15,Math.cos(((minLat+maxLat)/2)*Math.PI/180));const scale=Math.min((W*(1-2*pad))/Math.max(0.001,(maxLon-minLon)*cosLat),(H*(1-2*pad))/Math.max(0.001,maxLat-minLat));const offX=W/2-(minLon+maxLon)/2*cosLat*scale,offY=H/2+(minLat+maxLat)/2*scale;return{project:([lo,la])=>[lo*cosLat*scale+offX,offY-la*scale],bounds:{minLon,maxLon,minLat,maxLat}};}
function ringPath(ring,proj){return ring.map((p,i)=>(i===0?'M':'L')+proj(p).map(n=>n.toFixed(1)).join(',')).join(' ')+'Z';}
function featurePath(f,proj){const g=f.geometry;if(g.type==='Polygon')return g.coordinates.map(r=>ringPath(r,proj)).join(' ');if(g.type==='MultiPolygon')return g.coordinates.map(p=>p.map(r=>ringPath(r,proj)).join(' ')).join(' ');return '';}

function matchCountries(items,features){const matched=new Map(),unmatched=[];if(!features)return{matched,unmatched:items};const byNorm=new Map();features.forEach(f=>byNorm.set(normName(f.properties.name),f));items.forEach(it=>{const n=normName(it.name),canon=WORLD_ALIASES[n]||n;const f=byNorm.get(canon)||byNorm.get(n);if(f){const cur=matched.get(f.id)||{id:f.id,label:f.properties.name,value:0,feature:f};cur.value+=toNum(it.value);matched.set(f.id,cur);}else unmatched.push(it);});return{matched,unmatched};}

/* ── Charts ── */
function DonutChart({data,size=120}){
  const valid=data.filter(d=>d.value>0);if(!valid.length)return <div style={{color:T.muted,fontSize:12}}>No data</div>;
  const total=valid.reduce((s,d)=>s+d.value,0);
  const cx=size/2,cy=size/2,r=size*0.38,ir=size*0.24,toRad=deg=>deg*Math.PI/180;
  let angle=-90;
  const slices=valid.map(d=>{const sa=angle,sw=(d.value/total)*360;angle+=sw;const ea=angle,large=sw>180?1:0;
    const p=`M${(cx+r*Math.cos(toRad(sa))).toFixed(2)},${(cy+r*Math.sin(toRad(sa))).toFixed(2)}A${r},${r},0,${large},1,${(cx+r*Math.cos(toRad(ea))).toFixed(2)},${(cy+r*Math.sin(toRad(ea))).toFixed(2)}L${(cx+ir*Math.cos(toRad(ea))).toFixed(2)},${(cy+ir*Math.sin(toRad(ea))).toFixed(2)}A${ir},${ir},0,${large},0,${(cx+ir*Math.cos(toRad(sa))).toFixed(2)},${(cy+ir*Math.sin(toRad(sa))).toFixed(2)}Z`;
    return {...d,p,sw};});
  return <svg viewBox={`0 0 ${size} ${size}`} style={{width:size,height:size,flexShrink:0}}>{slices.map((s,i)=><path key={i} d={s.p} fill={s.color} stroke="white" strokeWidth="1.5"><title>{s.label}: {s.value.toFixed(0)}%</title></path>)}</svg>;
}

function TrendChart({data}){
  if(data.length<2)return null;

        {grids.map(t=><text key={"y"+t} x={pL-4} y={pT+h*(1-t)+4} textAnchor="end" fontSize="10" fill={T.muted} fontFamily="IBM Plex Mono,monospace">{fmt(maxVal*t)}</text>)}
        {data.map((d,i)=><text key={i} x={x(i)} y={H-6} textAnchor="middle" fontSize="9" fill={T.muted}>{d.label}</text>)}

    </div>
  </div>;
}

function MapLegend({matched,unmatched,hasOtherRing}){
  const list=Array.from(matched.values()).sort((a,b)=>b.value-a.value);
  if(!list.length&&!unmatched.length)return <div style={{fontSize:12,color:T.muted}}>No data yet</div>;
  return <div style={{display:'flex',flexDirection:'column',gap:5,maxHeight:180,overflowY:'auto'}}>
    {list.map(m=><div key={m.id} style={{display:'flex',justifyContent:'space-between',fontSize:12.5,color:T.muted}}><span>{m.label}</span><span style={{fontFamily:'IBM Plex Mono,monospace',color:T.ink,fontWeight:500}}>{m.value.toFixed(0)}%</span></div>)}
    {unmatched.length>0&&<div style={{marginTop:list.length?5:0,paddingTop:list.length?5:0,borderTop:list.length?`1px solid ${T.border}`:'none'}}>
      {unmatched.map((u,i)=>{const isO=normName(u.name)==='other';const note=isO?(hasOtherRing?'in the Other ring':'undetected'):'check spelling';
        return <div key={i} style={{display:'flex',justifyContent:'space-between',fontSize:11,color:T.muted,fontStyle:'italic'}}><span>{u.name||'(unnamed)'} <span style={{fontSize:10}}>· {note}</span></span><span style={{fontFamily:'IBM Plex Mono,monospace'}}>{toNum(u.value).toFixed(0)}%</span></div>;})}
    </div>}
  </div>;
}
function WorldMap({items}){
  const{features,error}=useTopoFeatures('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json','countries');
  const{matched,unmatched}=useMemo(()=>matchCountries(items||[],features),[items,features]);
  const maxVal=useMemo(()=>Math.max(0,...Array.from(matched.values()).map(m=>m.value)),[matched]);
  const W=600,H=320;
  const{project}=useMemo(()=>features?makeProjector(features,null,W,H,0.03):{project:null},[features]);
  if(error)return <div style={{fontSize:12,color:T.muted}}>Map couldn't load.</div>;
  if(!project)return <div style={{fontSize:12,color:T.muted}}>Loading map…</div>;
  return <div style={{display:'flex',gap:14,alignItems:'flex-start',flexWrap:'wrap'}}>
    <svg viewBox={`0 0 ${W} ${H}`} style={{width:320,flexShrink:0}}>
      {features.map(f=>{const m=matched.get(f.id);return <path key={f.id} d={featurePath(f,project)} fill={m?choroplethColor(m.value,maxVal):'#EFE9DC'} stroke="white" strokeWidth="0.5"><title>{f.properties.name}{m?`: ${m.value.toFixed(0)}%`:''}</title></path>;})}
    </svg>
    <div style={{flex:1,minWidth:140}}><MapLegend matched={matched} unmatched={unmatched}/></div>
  </div>;
}
function UtahMap({items}){
  const{features,error}=useTopoFeatures('https://cdn.jsdelivr.net/npm/us-atlas@3/counties-10m.json','counties',f=>String(f.id).startsWith('49'));
  const{matched,unmatched}=useMemo(()=>matchCities(items||[]),[items]);
  const maxVal=useMemo(()=>Math.max(0,...Array.from(matched.values()).map(m=>m.value)),[matched]);
  const otherTotal=useMemo(()=>unmatched.reduce((s,u)=>s+toNum(u.value),0),[unmatched]);
  const W=300,H=300;
  const cityPts=useMemo(()=>Array.from(matched.values()).map(m=>m.lonLat),[matched]);
  const{project,bounds}=useMemo(()=>features?makeProjector(features,cityPts,W,H,0.18):{project:null,bounds:null},[features,cityPts]);
  const halo=useMemo(()=>{if(!bounds||!project)return null;const corners=[[bounds.minLon,bounds.minLat],[bounds.maxLon,bounds.maxLat],[bounds.minLon,bounds.maxLat],[bounds.maxLon,bounds.minLat]].map(project);const cx=corners.reduce((s,p)=>s+p[0],0)/4,cy=corners.reduce((s,p)=>s+p[1],0)/4;return{cx,cy,r:Math.max(...corners.map(p=>Math.hypot(p[0]-cx,p[1]-cy)))+36};},[bounds,project]);
  if(error)return <div style={{fontSize:12,color:T.muted}}>Map couldn't load.</div>;
  if(!project)return <div style={{fontSize:12,color:T.muted}}>Loading map…</div>;
  return <div>
    <div style={{display:'flex',gap:14,alignItems:'flex-start',flexWrap:'wrap'}}>
      <svg viewBox={`0 0 ${W} ${H}`} style={{width:260,flexShrink:0}}>
        {otherTotal>0&&halo&&<g><circle cx={halo.cx} cy={halo.cy} r={halo.r} fill="#F1DFB8"/><text x={halo.cx-halo.r+6} y={halo.cy-halo.r+16} fontSize="11" fontWeight="500" fill="#8A6A2E" fontFamily="Inter,sans-serif">Other {otherTotal.toFixed(0)}%</text></g>}
        {features.map(f=><path key={f.id} d={featurePath(f,project)} fill="white" stroke="#D8CFC0" strokeWidth="0.8"><title>{f.properties.name} County</title></path>)}
        {Array.from(matched.values()).map(m=>{const[cx,cy]=project(m.lonLat);const t=maxVal?m.value/maxVal:0,r=Math.max(6,Math.sqrt(t)*22);return <g key={m.id}><circle cx={cx} cy={cy} r={r} fill={choroplethColor(m.value,maxVal)} fillOpacity="0.85" stroke="white" strokeWidth="1.2"><title>{m.label}: {m.value.toFixed(0)}%</title></circle>{r>13&&<text x={cx} y={cy+4} textAnchor="middle" fontSize="9" fontWeight="500" fill={t<0.5?T.ink:'white'} fontFamily="IBM Plex Mono,monospace" style={{pointerEvents:'none'}}>{m.value.toFixed(0)}%</text>}</g>;})}
      </svg>
      <div style={{flex:1,minWidth:130}}><MapLegend matched={matched} unmatched={unmatched} hasOtherRing/></div>
    </div>
    {otherTotal>0&&<p style={{fontSize:11,color:T.muted,marginTop:8,fontStyle:'italic'}}>Tan ring = "Other" ({otherTotal.toFixed(0)}%) — viewers TikTok couldn't detect or rank.</p>}
  </div>;
}

function SlotEditor({slots,onChange,placeholder='Location name'}){
  const total=slots.reduce((s,e)=>s+toNum(e.value),0);
  return <div>
    <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(200px,1fr))',gap:6}}>

  </div>;

function ImageField({value,onChange}){
  const fileRef=useRef();
  const[busy,setBusy]=useState(false);
  const isData=(value||'').startsWith('data:');
  const handleFile=async e=>{
    const f=e.target.files?.[0];if(!f)return;
    setBusy(true);
    try{const dataUrl=await compressImage(f);onChange(dataUrl);}
    catch(err){alert('Could not read image: '+err.message);}
    setBusy(false);e.target.value='';
  };
  return <div style={{display:'flex',gap:10,alignItems:'flex-start'}}>
    {value?<div style={{position:'relative',flexShrink:0}}>
      <img src={value} style={{width:88,height:88,objectFit:'cover',borderRadius:8,border:`1px solid ${T.border}`,display:'block'}}/>
      <button type="button" onClick={()=>onChange('')} title="Remove image" style={{position:'absolute',top:-7,right:-7,background:T.ink,color:'#fff',border:'2px solid '+T.paper,borderRadius:'50%',width:20,height:20,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',padding:0}}><X size={11}/></button>
    </div>:<div style={{width:88,height:88,borderRadius:8,background:T.empty,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}><ImageIcon size={20} stroke={T.muted}/></div>}
    <div style={{flex:1,display:'flex',flexDirection:'column',gap:6,minWidth:0}}>
      <div style={{display:'flex',gap:8}}>
        <Btn onClick={()=>fileRef.current?.click()}><Upload size={13}/> {busy?'Processing…':'Upload image'}</Btn>
        <input ref={fileRef} type="file" accept="image/*" onChange={handleFile} style={{display:'none'}}/>
      </div>
      <input type="url" placeholder="…or paste an image URL" value={isData?'':(value||'')} onChange={e=>onChange(e.target.value)} style={iS}/>
      <span style={{fontSize:10.5,color:T.muted,lineHeight:1.4}}>Uploaded images are compressed and saved in your browser's storage. For lots of posts, a hosted image URL keeps things lighter.</span>
    </div>
  </div>;
}

/* ── CSVImportModal ── */
function CSVImportModal({clients,onClose,onImport}){
  const[clientId,setClientId]=useState(clients[0]?.id||'');
  const[parsed,setParsed]=useState(null);
  const[error,setError]=useState('');
  const[done,setDone]=useState(false);
  const fileRef=useRef();
  const handleFile=e=>{const f=e.target.files?.[0];if(!f)return;setError('');setParsed(null);setDone(false);const r=new FileReader();r.onload=ev=>{try{const p=parseImportedCSV(ev.target.result,clientId);if(!p.length){setError('No valid rows found. Make sure the file has a Date column and at least some data.');return;}setParsed(p);}catch(err){setError('Could not read file: '+err.message);}};r.readAsText(f);};
  const reparse=id=>{setClientId(id);setParsed(p=>p?p.map(post=>({...post,clientId:id})):p);};
  const counts=parsed?parsed.reduce((m,p)=>({...m,[p.platform]:(m[p.platform]||0)+1}),{}):{};
  const doImport=()=>{onImport(parsed);setParsed(null);setDone(true);};
  return <div onClick={onClose} style={{position:'fixed',inset:0,background:'rgba(38,34,30,0.5)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:50,padding:16}}>
    <div onClick={e=>e.stopPropagation()} style={{background:T.paper,borderRadius:14,width:560,maxWidth:'100%',maxHeight:'88vh',overflowY:'auto',padding:26,border:`1px solid ${T.border}`}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:18}}>
        <h2 style={{fontFamily:'Fraunces,Georgia,serif',fontSize:21,fontWeight:500,color:T.ink,margin:0}}>Import from Google Sheet CSV</h2>
        <button onClick={onClose} style={{background:'none',border:'none',cursor:'pointer',color:T.muted,padding:4}}><X size={20}/></button>
      </div>
      {done?<div style={{textAlign:'center',padding:'24px 0'}}>
        <div style={{fontSize:32,marginBottom:10}}>✓</div>
        <div style={{fontSize:15,color:T.ink,fontWeight:500,marginBottom:6}}>Import complete</div>
        <div style={{fontSize:13,color:T.muted,marginBottom:20}}>Posts added. Hover any post card and click the pencil (or click the card, then "Edit post") to add city-level location detail, a thumbnail image, and anything else the sheet didn't include.</div>
        <Btn variant="primary" onClick={onClose}>Close</Btn>
      </div>:<>
        <div style={{marginBottom:14}}><Field label="Assign to page"><select value={clientId} onChange={e=>reparse(e.target.value)} style={iS}>{clients.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}</select></Field></div>
        <div style={{background:'#F4EEE0',border:'1px solid #DCCFB2',borderRadius:10,padding:'12px 14px',marginBottom:14,fontSize:12.5,color:'#6B5E4C',lineHeight:1.5}}>
          <strong>Your existing columns are recognised automatically</strong> — Date, Video Name, Views, Likes, Comments, Shares, Saves, Video Length, Average Watch Time, % Completed, New Followers, For You, Personal Profile, Other Traffic, Search, New, Returning, Male, Female, Other Gender, 18–24 through 55+, Salt Lake County, Utah County, Davis County, Other County, In US, Out US. Instagram I- columns on the same row are also imported as separate posts.
        </div>
        <div style={{border:'2px dashed #E7DFD2',borderRadius:10,padding:'28px 20px',textAlign:'center',marginBottom:14,cursor:'pointer'}} onClick={()=>fileRef.current?.click()}>
          <div style={{fontSize:13.5,color:T.muted,marginBottom:10}}>Export your sheet as <strong>File → Download → CSV (.csv)</strong> then upload it here</div>
          <Btn variant="primary"><Upload size={14}/> Choose CSV file</Btn>
          <input ref={fileRef} type="file" accept=".csv,text/csv" onChange={handleFile} style={{display:'none'}}/>
        </div>
        {error&&<div style={{background:T.badBg,border:'1px solid #F0D3D3',borderRadius:8,padding:'10px 14px',fontSize:13,color:T.badText,marginBottom:12}}>{error}</div>}
        {parsed&&<div style={{background:T.goodBg,border:'1px solid #CFE6D5',borderRadius:10,padding:'14px 16px',marginBottom:16}}>
          <div style={{fontSize:13.5,fontWeight:600,color:T.goodText,marginBottom:6}}>✓ Ready to import {parsed.length} posts</div>
          <div style={{fontSize:12.5,color:'#2E7D46',display:'flex',gap:14}}>{counts.tiktok&&<span>TikTok: {counts.tiktok}</span>}{counts.instagram&&<span>Instagram: {counts.instagram}</span>}</div>
          <div style={{fontSize:12,color:'#3D6B46',marginTop:6}}>County location data will be imported. Open any post afterward to add city-level detail, a thumbnail image, or anything else the sheet didn't include.</div>
        </div>}
        {parsed&&<div style={{display:'flex',justifyContent:'flex-end',gap:10}}><Btn onClick={()=>setParsed(null)}>Clear</Btn><Btn variant="primary" onClick={doImport}><Download size={14}/> Import {parsed.length} posts</Btn></div>}
      </>}
    </div>
  </div>;
}


/* ── Dashboard components ── */
function WeeklyKPICard({label,rawValue,delta,icon:Icon2}){
  const hasDelta=delta!==null&&delta!==undefined,positive=delta>0,flat=!hasDelta||Math.abs(delta)<0.5;
  const bg=hasDelta&&!flat?(positive?T.goodBg:T.badBg):T.card;
  const border=hasDelta&&!flat?(positive?'#CFE6D5':'#F0D3D3'):T.border;
  const color=flat?T.muted:(positive?T.goodText:T.badText);
  const big=hasDelta&&!flat?`${positive?'▲':'▼'} ${Math.abs(delta).toFixed(1)}%`:(hasDelta?'— no change':rawValue);
  return <div style={{background:bg,border:`1px solid ${border}`,borderRadius:12,padding:'16px 18px',flex:1,minWidth:0}}>
    <div style={{display:'flex',alignItems:'center',gap:6,fontSize:11,color:T.muted,letterSpacing:'0.03em',textTransform:'uppercase',marginBottom:8}}>{Icon2&&<Icon2 size={13}/>}{label}</div>
    <div style={{fontFamily:'Fraunces,Georgia,serif',fontSize:26,fontWeight:500,color:hasDelta&&!flat?color:T.ink}}>{big}</div>
    {hasDelta&&!flat&&<div style={{fontFamily:'IBM Plex Mono,monospace',fontSize:12,marginTop:4,color:T.muted}}>{rawValue} this week</div>}
  </div>;
}

function WeeksTable({weeks,onJump}){
  return <div style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:14,overflow:'hidden',marginBottom:24}}>
    <div style={{display:'grid',gridTemplateColumns:'1.6fr 1fr 1fr 1fr 1fr 1fr',padding:'11px 18px',borderBottom:`1px solid ${T.border}`,fontSize:11,color:T.muted,letterSpacing:'0.03em',textTransform:'uppercase'}}>
      <span>Week</span><span>Instagram</span><span>TikTok</span><span>Total views</span><span>Engagement</span><span>Vs last week</span>
    </div>
    {weeks.slice(0,10).map((w,i,arr)=>{
      const ig=w.items.filter(p=>p.platform==='instagram').reduce((s,p)=>s+p.views,0);
      const tt=w.items.filter(p=>p.platform==='tiktok').reduce((s,p)=>s+p.views,0);
      const total=ig+tt,er=total?w.items.reduce((s,p)=>s+p.likes+p.comments+p.shares+p.saves,0)/total*100:0;
      const prev=arr[i+1]?arr[i+1].items.reduce((s,p)=>s+p.views,0):null;
      const delta=prev?((total-prev)/prev*100):null;
      const positive=delta>0,flat=delta!==null&&Math.abs(delta)<0.5;
      return <div key={w.weekStart} onClick={()=>onJump(w.weekStart)} style={{display:'grid',gridTemplateColumns:'1.6fr 1fr 1fr 1fr 1fr 1fr',padding:'13px 18px',borderBottom:i===arr.slice(0,10).length-1?'none':`1px solid ${T.border}`,fontSize:13,color:T.ink,cursor:'pointer',alignItems:'center'}} onMouseEnter={e=>e.currentTarget.style.background='#FBF8F2'} onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
        <span style={{fontWeight:500}}>{weekLabel(w.weekStart)}</span>
        <span style={{fontFamily:'IBM Plex Mono,monospace',color:T.ig}}>{fmt(ig)}</span>
        <span style={{fontFamily:'IBM Plex Mono,monospace',color:T.tt}}>{fmt(tt)}</span>
        <span style={{fontFamily:'IBM Plex Mono,monospace',fontWeight:500}}>{fmt(total)}</span>
        <span style={{fontFamily:'IBM Plex Mono,monospace',color:T.muted}}>{er.toFixed(1)}%</span>
        <span>{delta===null?<span style={{fontFamily:'IBM Plex Mono,monospace',fontSize:11.5,color:T.muted}}>—</span>:<span style={{display:'inline-flex',alignItems:'center',fontFamily:'IBM Plex Mono,monospace',fontSize:11.5,fontWeight:500,padding:'3px 8px',borderRadius:6,background:flat?'#F1EBDF':(positive?T.goodBg:T.badBg),color:flat?T.muted:(positive?T.goodText:T.badText)}}>{flat?'flat':`${positive?'▲':'▼'} ${Math.abs(delta).toFixed(0)}%`}</span>}</span>
      </div>;})}
  </div>;
}
function DataTableView({posts,clients,onEdit,onDelete}){
  const[filter,setFilter]=useState('all');
  const[search,setSearch]=useState('');
  const clientName=id=>clients.find(c=>c.id===id)?.name||id;
  const filtered=posts.filter(p=>filter==='all'||p.platform===filter||p.clientId===filter).filter(p=>!search||(p.caption||'').toLowerCase().includes(search.toLowerCase())||p.date.includes(search)).sort((a,b)=>a.date<b.date?1:-1);
  return <div style={{paddingBottom:40}}>
    <div style={{display:'flex',gap:10,marginBottom:16,flexWrap:'wrap',alignItems:'center'}}>
      <input type="text" placeholder="Search by caption or date…" value={search} onChange={e=>setSearch(e.target.value)} style={{...iS,width:'auto',flex:1,minWidth:180}}/>
      <select value={filter} onChange={e=>setFilter(e.target.value)} style={{...iS,width:'auto'}}>
        <option value="all">All posts</option>
        <option value="tiktok">TikTok only</option>
        <option value="instagram">Instagram only</option>
        {clients.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
      </select>
      <div style={{fontFamily:'IBM Plex Mono,monospace',fontSize:12,color:T.muted,whiteSpace:'nowrap'}}>{filtered.length} posts</div>
    </div>
    <div style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:12,overflow:'hidden'}}>
      <div style={{display:'grid',gridTemplateColumns:'100px 90px 110px 1fr 80px 70px 55px 80px',padding:'10px 14px',borderBottom:`1px solid ${T.border}`,fontSize:11,color:T.muted,letterSpacing:'0.03em',textTransform:'uppercase'}}>
        <span>Date</span><span>Platform</span><span>Page</span><span>Caption</span><span>Views</span><span>Likes</span><span>ER%</span><span/>
      </div>
      {filtered.length===0&&<div style={{padding:'30px',textAlign:'center',color:T.muted,fontSize:13.5}}>No posts match this filter.</div>}
      {filtered.map((p,i)=><div key={p.id} style={{display:'grid',gridTemplateColumns:'100px 90px 110px 1fr 80px 70px 55px 80px',padding:'11px 14px',borderBottom:i===filtered.length-1?'none':`1px solid ${T.border}`,fontSize:13,color:T.ink,alignItems:'center'}} onMouseEnter={e=>e.currentTarget.style.background='#FBF8F2'} onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
        <span style={{fontFamily:'IBM Plex Mono,monospace',fontSize:12}}>{p.date}</span>
        <span style={{color:p.platform==='tiktok'?T.tt:T.ig,fontWeight:500,fontSize:12}}>{p.platform==='tiktok'?'TikTok':'IG'}</span>
        <span style={{color:T.muted,fontSize:12}}>{clientName(p.clientId)}</span>
        <span style={{overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',paddingRight:8}}>{p.caption||'—'}</span>
        <span style={{fontFamily:'IBM Plex Mono,monospace',fontSize:12}}>{fmt(p.views)}</span>
        <span style={{fontFamily:'IBM Plex Mono,monospace',fontSize:12}}>{fmt(p.likes)}</span>
        <span style={{fontFamily:'IBM Plex Mono,monospace',fontSize:12,color:T.muted}}>{erRate(p).toFixed(1)}</span>
        <div style={{display:'flex',gap:6}}>
          <button onClick={()=>onEdit(p)} title="Edit" style={{background:'none',border:`1px solid ${T.border}`,borderRadius:6,padding:'4px 7px',cursor:'pointer',color:T.muted,display:'flex',alignItems:'center'}}><Pencil size={13}/></button>
          <button onClick={()=>{if(confirm('Delete this post?'))onDelete(p.id);}} title="Delete" style={{background:'none',border:'1px solid #E8C7C7',borderRadius:6,padding:'4px 7px',cursor:'pointer',color:T.badText,display:'flex',alignItems:'center'}}><Trash2 size={13}/></button>
        </div>
      </div>)}
    </div>
  </div>;
}


/* ── App ── */
function App(){
  const[posts,setPosts]=useState(()=>loadPosts());
  const[clients,setClients]=useState(()=>loadClients());
  const[activeClient,setActiveClient]=useState(null);
  const[platformFilter,setPlatformFilter]=useState('all');
  const[view,setView]=useState('dashboard');
  const[modal,setModal]=useState(null);
  const[showCSV,setShowCSV]=useState(false);
  const[visibleWeeks,setVisibleWeeks]=useState(6);
  const[selectedPost,setSelectedPost]=useState(null);
  const[newClientName,setNewClientName]=useState('');
  const fileRef=useRef();

  useEffect(()=>{savePosts(posts);},[posts]);
  useEffect(()=>{saveClients(clients);},[clients]);
  useEffect(()=>{if(clients.length&&!activeClient)setActiveClient(clients[0].id);},[clients]);

  const handleSave=useCallback(post=>{setPosts(prev=>{const e=prev.some(p=>p.id===post.id);return e?prev.map(p=>p.id===post.id?post:p):[...prev,post];});setModal(null);},[]);
  const handleDelete=useCallback(id=>{setPosts(prev=>prev.filter(p=>p.id!==id));setModal(null);setSelectedPost(null);},[]);
  const handleCSVImport=useCallback(newPosts=>{setPosts(prev=>{const ids=new Set(prev.map(p=>p.id));return[...prev,...newPosts.filter(p=>!ids.has(p.id))];});setShowCSV(false);},[]);
  const handleExport=()=>exportBackup(posts,clients);
  const handleImportFile=async e=>{const f=e.target.files?.[0];if(!f)return;try{const txt=await f.text();const{posts:np,clients:nc}=parseBackup(txt);const mode=confirm(`Found ${np.length} posts.\n\nOK = Replace all data\nCancel = Merge`);if(mode){setPosts(np);if(nc)setClients(nc);}else{setPosts(prev=>{const ids=new Set(prev.map(p=>p.id));return[...prev,...np.filter(p=>!ids.has(p.id))];});};}catch(err){alert('Import failed: '+err.message);}e.target.value='';};
  const handleAddClient=()=>{const name=newClientName.trim();if(!name)return;const id=name.toLowerCase().replace(/[^a-z0-9]/g,'-');setClients(prev=>[...prev,{id,name,color:CLIENT_COLORS[prev.length%CLIENT_COLORS.length]}]);setActiveClient(id);setNewClientName('');setModal(null);};

  const clientPosts=useMemo(()=>posts.filter(p=>p.clientId===activeClient&&(platformFilter==='all'||p.platform===platformFilter)),[posts,activeClient,platformFilter]);
  const weeks=useMemo(()=>{const map=new Map();clientPosts.forEach(p=>{const ws=weekStart(p.date);if(!map.has(ws))map.set(ws,[]);map.get(ws).push(p);});return Array.from(map.entries()).map(([ws,items])=>({weekStart:ws,items:items.sort((a,b)=>a.date<b.date?1:-1)})).sort((a,b)=>a.weekStart<b.weekStart?1:-1);},[clientPosts]);
  const thisWeek=weeks[0]?.items||[],lastWeek=weeks[1]?.items||[];
  const kpi=useMemo(()=>{const keys=['views','likes','comments','shares','saves','newFollowers'];return Object.fromEntries(keys.map(k=>[k,{value:sumField(thisWeek,k),delta:lastWeek.length?pctChange(sumField(thisWeek,k),sumField(lastWeek,k)):null}]));},[thisWeek,lastWeek]);
  const chartData=useMemo(()=>[...weeks].sort((a,b)=>a.weekStart<b.weekStart?-1:1).slice(-10).map(w=>({label:weekLabel(w.weekStart).replace('Week of ',''),instagram:w.items.filter(p=>p.platform==='instagram').reduce((s,p)=>s+p.views,0),tiktok:w.items.filter(p=>p.platform==='tiktok').reduce((s,p)=>s+p.views,0)})),[weeks]);
  const traffic=useMemo(()=>avgGroup(thisWeek,'traffic',TRAFFIC_KEYS),[thisWeek]);
  const newRet=useMemo(()=>avgGroup(thisWeek,'newReturning',NEWRET_KEYS),[thisWeek]);
  const gender=useMemo(()=>avgGroup(thisWeek,'gender',GENDER_KEYS),[thisWeek]);
  const age=useMemo(()=>avgGroup(thisWeek,'age',AGE_KEYS),[thisWeek]);
  const locUS=useMemo(()=>avgSlots(thisWeek,'us'),[thisWeek]);
  const locUtah=useMemo(()=>avgSlots(thisWeek,'utah'),[thisWeek]);
  const hasAudience=!!(traffic||newRet||gender||age||locUS||locUtah);
  const activeClientObj=clients.find(c=>c.id===activeClient);
  const jumpToWeek=ws=>{const el=document.getElementById('week-'+ws);if(el)el.scrollIntoView({behavior:'smooth',block:'start'});};

  return <div style={{background:T.paper,minHeight:'100vh',padding:'28px 32px 80px',maxWidth:1200,margin:'0 auto'}}>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-end',marginBottom:24,flexWrap:'wrap',gap:12}}>
      <div>
        <div style={{fontSize:11,letterSpacing:'0.12em',textTransform:'uppercase',color:T.muted,marginBottom:4}}>Social performance</div>
        <h1 style={{fontFamily:"Fraunces,Georgia,serif",fontSize:30,fontWeight:500,margin:0,color:T.ink}}>{activeClientObj?.name||'Dashboard'}</h1>
      </div>
      <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
        <input ref={fileRef} type="file" accept=".json" onChange={handleImportFile} style={{display:'none'}}/>
        <Btn onClick={handleExport} title="Download all data as JSON"><Download size={14}/> Export backup</Btn>
        <Btn onClick={()=>fileRef.current?.click()} title="Restore from JSON backup"><Upload size={14}/> Import backup</Btn>
        <Btn onClick={()=>setShowCSV(true)} title="Import from Google Sheet CSV"><Upload size={14}/> Import from sheet</Btn>
        <Btn onClick={()=>setView(v=>v==='dashboard'?'table':'dashboard')}>{view==='dashboard'?<Database size={14}/>:<LayoutDashboard size={14}/>} {view==='dashboard'?'View all data':'View dashboard'}</Btn>
        <Btn variant="primary" onClick={()=>setModal('add')}><Plus size={14}/> Add post</Btn>
      </div>
    </div>

    <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:24,flexWrap:'wrap'}}>
      {clients.map(c=><button key={c.id} onClick={()=>setActiveClient(c.id)} style={{fontFamily:'Inter,sans-serif',fontSize:13,fontWeight:500,padding:'6px 13px',borderRadius:20,cursor:'pointer',display:'inline-flex',alignItems:'center',gap:7,border:`1px solid ${c.id===activeClient?c.color:T.border}`,background:c.id===activeClient?c.color:'transparent',color:c.id===activeClient?'#fff':T.ink}}><span style={{width:7,height:7,borderRadius:'50%',background:c.id===activeClient?'#fff':c.color}}/>{c.name}</button>)}
      <button onClick={()=>setModal('addClient')} style={{fontFamily:'Inter,sans-serif',fontSize:13,color:T.muted,background:'none',border:`1px dashed ${T.border}`,borderRadius:20,padding:'6px 13px',cursor:'pointer',display:'inline-flex',alignItems:'center',gap:5}}><Plus size={13}/> Add page</button>
    </div>

    {view==='table'&&<DataTableView posts={posts} clients={clients} onEdit={p=>setModal({type:'edit',post:p})} onDelete={handleDelete}/>}

    {view==='dashboard'&&<div>
      {clientPosts.length===0?<div style={{border:`1px dashed ${T.border}`,borderRadius:14,padding:'50px 30px',textAlign:'center',color:T.muted}}>
        <div style={{fontFamily:"Fraunces,Georgia,serif",fontSize:20,color:T.ink,marginBottom:6}}>No posts yet for {activeClientObj?.name}</div>
        <div style={{fontSize:13.5,marginBottom:18}}>Add a post manually or import from your Google Sheet CSV.</div>
        <div style={{display:'flex',gap:10,justifyContent:'center'}}>
          <Btn onClick={()=>setShowCSV(true)}><Upload size={14}/> Import from sheet</Btn>
          <Btn variant="primary" onClick={()=>setModal('add')}><Plus size={14}/> Add post</Btn>
        </div>
      </div>:<>
        <div style={{background:'#F4EEE0',border:'1px solid #DCCFB2',borderTop:`3px solid ${T.ink}`,borderRadius:14,padding:'16px 20px 20px',marginBottom:22}}>
          <div style={{display:'flex',alignItems:'baseline',justifyContent:'space-between',marginBottom:14,flexWrap:'wrap',gap:6}}>
            <div style={{fontFamily:"Fraunces,Georgia,serif",fontSize:17,fontWeight:500,color:T.ink}}>Weekly changes</div>
            <div style={{fontSize:12,color:T.muted}}>{weeks[0]?weekLabel(weeks[0].weekStart):''}{weeks[1]?' vs '+weekLabel(weeks[1].weekStart).replace('Week of ',''):'— no prior week'}</div>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(130px,1fr))',gap:10}}>
            <WeeklyKPICard label="Views"         rawValue={fmt(kpi.views?.value||0)}        delta={kpi.views?.delta}        icon={Eye}/>
            <WeeklyKPICard label="Likes"         rawValue={fmt(kpi.likes?.value||0)}        delta={kpi.likes?.delta}        icon={Heart}/>
            <WeeklyKPICard label="Comments"      rawValue={fmt(kpi.comments?.value||0)}     delta={kpi.comments?.delta}     icon={MessageCircle}/>
            <WeeklyKPICard label="Shares"        rawValue={fmt(kpi.shares?.value||0)}       delta={kpi.shares?.delta}       icon={Share2}/>
            <WeeklyKPICard label="Saves"         rawValue={fmt(kpi.saves?.value||0)}        delta={kpi.saves?.delta}        icon={Bookmark}/>
            <WeeklyKPICard label="New followers" rawValue={fmt(kpi.newFollowers?.value||0)} delta={kpi.newFollowers?.delta} icon={UserPlus}/>
          </div>
        </div>
        {chartData.length>1&&<TrendChart data={chartData}/>}
        <div style={{fontSize:11,letterSpacing:'0.1em',textTransform:'uppercase',color:T.muted,marginBottom:10}}>Weeks at a glance</div>
        <WeeksTable weeks={weeks} onJump={jumpToWeek}/>
        {hasAudience&&<div style={{marginBottom:24}}>
          <div style={{fontSize:11,letterSpacing:'0.1em',textTransform:'uppercase',color:T.muted,marginBottom:10}}>Audience snapshot — {weeks[0]?weekLabel(weeks[0].weekStart):''}</div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(270px,1fr))',gap:12,marginBottom:12}}>
            {gender&&<PiePanel title="Gender" keys={GENDER_KEYS} labels={GENDER_LABELS} colorMap={GENDER_COLOR} values={gender}/>}
            {age&&<PiePanel title="Age" keys={AGE_KEYS} labels={AGE_LABELS} colorMap={AGE_COLOR} values={age}/>}
            {traffic&&<BarPanel title="Traffic source" keys={TRAFFIC_KEYS} labels={TRAFFIC_LABELS} colorMap={TRAFFIC_COLOR} values={traffic}/>}
            {newRet&&<BarPanel title="New vs returning" keys={NEWRET_KEYS} labels={NEWRET_LABELS} colorMap={NEWRET_COLOR} values={newRet}/>}
          </div>
          {(locUS||locUtah)&&<div>
            <p style={{fontSize:11.5,color:T.muted,marginBottom:8,fontStyle:'italic'}}>"Other" = viewers TikTok couldn't detect or rank.</p>
            <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(270px,1fr))',gap:12}}>
              {locUS&&<div style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:12,padding:'14px 16px'}}><div style={{fontSize:11,color:T.muted,letterSpacing:'0.05em',textTransform:'uppercase',marginBottom:10}}>World map</div><WorldMap items={locUS}/></div>}
              {locUtah&&<div style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:12,padding:'14px 16px'}}><div style={{fontSize:11,color:T.muted,letterSpacing:'0.05em',textTransform:'uppercase',marginBottom:10}}>Utah map</div><UtahMap items={locUtah}/></div>}
            </div>
          </div>}
        </div>}
        <div style={{display:'flex',gap:7,marginBottom:18}}>
          {['all','instagram','tiktok'].map(p=><button key={p} onClick={()=>setPlatformFilter(p)} style={{fontFamily:'Inter,sans-serif',fontSize:12.5,fontWeight:500,padding:'5px 11px',borderRadius:6,cursor:'pointer',textTransform:'capitalize',border:`1px solid ${platformFilter===p?T.ink:T.border}`,background:platformFilter===p?T.ink:'transparent',color:platformFilter===p?'#FAF6EF':T.muted}}>{p}</button>)}
        </div>
        {weeks.slice(0,visibleWeeks).map(w=>{
          const ig=w.items.filter(p=>p.platform==='instagram').reduce((s,p)=>s+p.views,0);
          const tt=w.items.filter(p=>p.platform==='tiktok').reduce((s,p)=>s+p.views,0);
          const total=ig+tt,er=total?w.items.reduce((s,p)=>s+p.likes+p.comments+p.shares+p.saves,0)/total*100:0;
          return <div key={w.weekStart} id={'week-'+w.weekStart} style={{marginBottom:30,scrollMarginTop:20}}>
            <div style={{display:'flex',alignItems:'baseline',gap:14,borderTop:`1px solid ${T.border}`,paddingTop:14,marginBottom:14,flexWrap:'wrap'}}>
              <div style={{fontSize:11,letterSpacing:'0.1em',textTransform:'uppercase',color:T.muted}}>{weekLabel(w.weekStart)}</div>
              <div style={{fontFamily:'IBM Plex Mono,monospace',fontSize:12,display:'flex',gap:12,flexWrap:'wrap'}}>
                <span style={{color:T.ig}}>{fmt(ig)} IG</span><span style={{color:T.muted}}>·</span>
                <span style={{color:T.tt}}>{fmt(tt)} TikTok</span><span style={{color:T.muted}}>·</span>
                <span style={{color:T.ink}}>{er.toFixed(1)}% engagement</span>
              </div>
            </div>
            <div className="scroll-row" style={{display:'flex',gap:12,paddingBottom:4}}>{w.items.map(p=><PostCard key={p.id} post={p} onClick={()=>setSelectedPost(p)} onEdit={()=>setModal({type:'edit',post:p})}/>)}</div>
          </div>;})}
        {weeks.length>visibleWeeks&&<div style={{textAlign:'center',marginTop:6}}><Btn onClick={()=>setVisibleWeeks(v=>v+6)}>Show earlier weeks</Btn></div>}
      </>}
    </div>}

    {(modal==='add'||modal?.type==='edit')&&<AddPostModal clients={clients} initial={modal?.post} onClose={()=>setModal(null)} onSave={handleSave} onDelete={handleDelete}/>}
    {showCSV&&<CSVImportModal clients={clients} onClose={()=>setShowCSV(false)} onImport={handleCSVImport}/>}
    {modal==='addClient'&&<div onClick={()=>setModal(null)} style={{position:'fixed',inset:0,background:'rgba(38,34,30,0.5)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:50}}>
      <div onClick={e=>e.stopPropagation()} style={{background:T.paper,borderRadius:12,width:360,padding:24,border:`1px solid ${T.border}`}}>
        <h3 style={{fontFamily:"Fraunces,Georgia,serif",fontSize:19,fontWeight:500,color:T.ink,margin:'0 0 14px'}}>Add a page</h3>
        <input type="text" autoFocus placeholder="e.g. Body and Mind Collective" value={newClientName} onChange={e=>setNewClientName(e.target.value)} onKeyDown={e=>e.key==='Enter'&&handleAddClient()} style={iS}/>
        <div style={{display:'flex',justifyContent:'flex-end',gap:8,marginTop:16}}><Btn onClick={()=>setModal(null)}>Cancel</Btn><Btn variant="primary" onClick={handleAddClient}>Add page</Btn></div>
      </div>
    </div>}
    {selectedPost&&<PostDetail post={posts.find(p=>p.id===selectedPost.id)||selectedPost} onClose={()=>setSelectedPost(null)} onEdit={()=>{const p=posts.find(x=>x.id===selectedPost.id)||selectedPost;setSelectedPost(null);setModal({type:'edit',post:p});}}/>}
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
